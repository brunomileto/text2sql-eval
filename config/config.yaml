models:
  - provider: fake
    model: local-test
    temperature: 0.0
    max_tokens: 32
  - provider: openai
    model: gpt-4o
    temperature: 0.0
    max_tokens: 1024
  - provider: anthropic
    model: claude-3-5-sonnet-20241022
    temperature: 0.0
    max_tokens: 1024

rag:
  backend: chroma
  top_k: 5
  embedding_model: text-embedding-3-small
  index_path: data/rag_index/

inputs:
  questions_file: data/dev.json
  database_file: data/database.sqlite

run_defaults:
  tracks: [a]
  limit: null
  output_dir: results/
