models:
  - provider: openai
    model: gpt-4o
    temperature: 0.0
    max_tokens: 1024
  - provider: openai
    model: gpt-5.4-mini
    temperature: 0.0
    max_tokens: 1024
  - provider: openai
    model: gpt-5.4
    temperature: 0.0
    max_tokens: 1024
  - provider: maritaca
    model: sabia-4 
    temperature: 0.0
    max_tokens: 1024
    
rag:
  backend: chroma
  top_k: 5
  embedding_model: text-embedding-3-small
  index_path: data/rag_index/

inputs:
  questions_file: data/dev.json
  database_file: data/database.sqlite

run_defaults:
  tracks: [a]
  limit: null
  output_dir: results/
